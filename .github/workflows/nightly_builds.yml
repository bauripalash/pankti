name: Nightly Pre-Release Build
on:
  push:
    branches: 
      -  main
  workflow_dispatch: #manual mode
permissions:
  contents: write
jobs:
  check-trigger:
    name: Check Commit Message for [nightly]
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Check for [nightly] in commit message
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "Commit Message : $MSG"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || echo "$MSG" | grep -qF '[nightly]'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Build Nightly = YES"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Build Nightly = NO"
          fi
  
  build-linux:
    name: Build Linux (64bit)
    runs-on: ubuntu-latest
    needs: [check-trigger]
    if: needs.check-trigger.outputs.should_run == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install build-essential \
          libasound2-dev \
          libx11-dev \
          libxrandr-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libxcursor-dev \
          libxinerama-dev \
          libwayland-dev \
          libxkbcommon-dev
      - name: Setup CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GFX=ON
      - name: Build
        run: |
          cmake --build build --target pankti --parallel
      - name: Package to ZIP
        run: |
          zip pankti-linux64-nightly.zip build/pankti
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pankti-linux
          path: pankti-linux64-nightly.zip
  
  build-windows:
    name: Build Windows (32bit and 64bit)
    runs-on: windows-latest
    needs: [check-trigger]
    if: needs.check-trigger.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: win64
            cmake_arch: x64
          - label: win32
            cmake_arch: Win32
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup CMake
        run: |
          cmake -S . -B build `
          -G "Visual Studio 17 2022" `
          -A ${{ matrix.cmake_arch }} `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_GFX=ON `
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
      - name: Build
        run: cmake --build build --target pankti --config Release --parallel
      
      - name: Package to ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path build\pankti.exe -DestinationPath pankti-${{ matrix.label }}-nightly.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pankti-${{ matrix.label }}
          path: pankti-${{ matrix.label }}-nightly.zip
      
          
