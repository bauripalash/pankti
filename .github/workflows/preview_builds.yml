name: Preview Pre-Release Build
on:
  push:
    branches: 
      -  main
  workflow_dispatch: #manual mode
permissions:
  contents: write
jobs:
  check-trigger:
    name: Check Eligibility of Commit
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check whether to run
        id: check
        env:
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          echo "Event      : $EVENT"
          echo "Actor      : $ACTOR"
          echo "SHA        : $GITHUB_SHA"
          echo "COMMIT_MSG : ${COMMIT_MSG:-<none>}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ "$ACTOR" = "bauripalash" ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "[+] Manual Run : RUN"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "[-] Manual Run : SKIP"
            fi
            exit 0
          fi
          PARENTS="$(git show -s --format=%P "$GITHUB_SHA" | wc -w | tr -d ' ')"
          if [ "$PARENTS" -ge 2 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "[-] Merge Commit Detected : SKIP"
            exit 0
          fi

          if [ "$ACTOR" = "bauripalash" ] && echo "${COMMIT_MSG:-}" | grep -qF '[update-preview]'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "[+] Push by Palash Bauri with [update-preview] : RUN"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "[-] Push Not Eligible for Preview Update : SKIP"
          fi
  
  build-linux:
    name: Build Linux (64bit)
    runs-on: ubuntu-latest
    needs: [check-trigger]
    if: needs.check-trigger.outputs.should_run == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Fetch tags
        run: git fetch --tags --unshallow
      
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install build-essential \
          libasound2-dev \
          libx11-dev \
          libxrandr-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libxcursor-dev \
          libxinerama-dev \
          libwayland-dev \
          libxkbcommon-dev
      
      - name: Setup CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GFX=ON
      
      - name: Build
        run: |
          cmake --build build --target pankti --parallel
      
      - name: Run Tests
        run: make test_only
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pankti-linux
          path: build/pankti
  
  build-windows:
    name: Build Windows (32bit and 64bit)
    runs-on: windows-latest
    needs: [check-trigger]
    if: needs.check-trigger.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: win64
            cmake_arch: x64
          - label: win32
            cmake_arch: Win32
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch tags
        run: git fetch --tags --unshallow
      
      - name: Setup CMake
        run: |
          cmake -S . -B build `
          -G "Visual Studio 17 2022" `
          -A ${{ matrix.cmake_arch }} `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_GFX=ON `
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
      
      - name: Build
        run: cmake --build build --target pankti --config Release --parallel

      - name: Run Tests
        shell: cmd
        run: build.bat test_only
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pankti-${{ matrix.label }}
          path: build/pankti.exe

  release-preview:
    name: Upload to Preview Pre-Release
    runs-on: ubuntu-latest
    needs: [check-trigger, build-linux, build-windows]
    if: needs.check-trigger.outputs.should_run == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Fetch Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pankti-linux
          path: artifacts/linux

      - name: Fetch Win64 Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pankti-win64
          path: artifacts/win64
          
      - name: Fetch Win32 Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pankti-win32
          path: artifacts/win32
      
      - name: Zip Artifacts
        run: |
          zip -j pankti-linux64-preview.zip artifacts/linux/pankti
          zip -j pankti-win64-preview.zip artifacts/win64/pankti.exe
          zip -j pankti-win32-preview.zip artifacts/win32/pankti.exe
          git archive --format=zip --output=pankti-source-preview.zip HEAD
      
      - name: Ensure Preview Pre-Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view preview --repo ${{ github.repository }} 2>/dev/null \
          || gh release create preview \
            --repo ${{ github.repository }} \
            --title "Pankti Preview Build" \
            --notes "Latest automated preview builds." \
            --prerelease \
            --target main

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="$(TZ='Asia/Kolkata' date +"%d-%m-%Y %H:%M:%S IST")"
          SHA="${GITHUB_SHA}"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${SHA}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/preview"
          NOTES="$(cat <<EOF
          #### Pankti Preview Build
          Date: ${DATE}
          Commit: ${COMMIT_URL}
          Author: Palash Bauri

          Download Links:
          * Windows 32bit: ${BASE}/pankti-win32-preview.zip
          * Windows 64bit: ${BASE}/pankti-win64-preview.zip
          * Linux 64bit: ${BASE}/pankti-linux64-preview.zip
          * Source Code: ${BASE}/pankti-source-preview.zip
          
          [NOTE: Do not download the files SourceCode.zip/SourceCode.tar.gz, they are not latest code, instead download from above link]
          EOF
          )"
          gh release edit preview \
            --repo ${{ github.repository }} \
            --title "Pankti Preview Build ${DATE}" \
            --notes "$NOTES"
      
      - name: Upload Zips to Preview Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload preview \
            pankti-linux64-preview.zip \
            pankti-win64-preview.zip \
            pankti-win32-preview.zip \
            pankti-source-preview.zip \
            --repo ${{ github.repository }} \
            --clobber
        
          
