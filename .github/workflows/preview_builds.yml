name: Preview Pre-Release Build
on:
  push:
    branches: 
      -  main
  workflow_dispatch: #manual mode
permissions:
  contents: write
jobs:
  check-trigger:
    name: Check Commit Message for [update-preview]
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Check for [update-preview] in commit message
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          echo "Commit Message : $MSG"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || echo "$MSG" | grep -qF '[update-preview]'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Build Preview = YES"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Build Preview = NO"
          fi
  
  build-linux:
    name: Build Linux (64bit)
    runs-on: ubuntu-latest
    needs: [check-trigger]
    if: needs.check-trigger.outputs.should_run == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install deps
        run: |
          sudo apt update
          sudo apt install build-essential \
          libasound2-dev \
          libx11-dev \
          libxrandr-dev \
          libxi-dev \
          libgl1-mesa-dev \
          libglu1-mesa-dev \
          libxcursor-dev \
          libxinerama-dev \
          libwayland-dev \
          libxkbcommon-dev
      - name: Setup CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_GFX=ON
      - name: Build
        run: |
          cmake --build build --target pankti --parallel
      - name: Run Tests
        run: make test_only
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pankti-linux
          path: build/pankti
  
  build-windows:
    name: Build Windows (32bit and 64bit)
    runs-on: windows-latest
    needs: [check-trigger]
    if: needs.check-trigger.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: win64
            cmake_arch: x64
          - label: win32
            cmake_arch: Win32
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup CMake
        run: |
          cmake -S . -B build `
          -G "Visual Studio 17 2022" `
          -A ${{ matrix.cmake_arch }} `
          -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_GFX=ON `
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
      - name: Build
        run: cmake --build build --target pankti --config Release --parallel

      - name: Run Tests
        shell: cmd
        run: build.bat test_only
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pankti-${{ matrix.label }}
          path: build/pankti.exe

  release-preview:
    name: Upload to Preview Pre-Release
    runs-on: ubuntu-latest
    needs: [check-trigger, build-linux, build-windows]
    if: needs.check-trigger.outputs.should_run == 'true'
    steps:
      - name: Fetch Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pankti-linux
          path: artifacts/linux

      - name: Fetch Win64 Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pankti-win64
          path: artifacts/win64
          
      - name: Fetch Win32 Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pankti-win32
          path: artifacts/win32
      - name: Zip Artifacts
        run: |
          zip -j pankti-linux64-preview.zip artifacts/linux/pankti
          zip -j pankti-win64-preview.zip artifacts/win64/pankti.exe
          zip -j pankti-win32-preview.zip artifacts/win32/pankti.exe
      - name: Ensure Preview Pre-Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view preview --repo ${{ github.repository }} 2>/dev/null \
          || gh release create preview \
            --repo ${{ github.repository }} \
            --title "Pankti Development Build" \
            --notes "Latest automated preview builds." \
            --prerelease \
            --target main

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +'%d-%m-%Y')
          gh release edit preview \
            --repo ${{ github.repository }} \
            --notes "Pankti built on $DATE"
      
      - name: Upload Zips to Preview Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload preview \
            pankti-linux64-preview.zip \
            pankti-win64-preview.zip \
            pankti-win32-preview.zip \
            --repo ${{ github.repository }} \
            --clobber
        
          
